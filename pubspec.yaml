name: proteforms
description: Proteforms RTI Offline App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.1
  http: ^1.2.0
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.8.3
  image_picker: ^1.0.7
  pdf: ^3.10.7
  printing: ^5.11.1
  intl: ^0.20.2
  uuid: ^4.5.3
  speech_to_text: ^7.3.0
  signature: ^6.3.0
  dotted_border: ^3.1.0
  mask_text_input_formatter: ^2.9.0
  open_filex: ^4.7.0
  fl_chart: ^1.2.0
  flutter_secure_storage: ^10.0.0
  connectivity_plus: ^7.1.1
  supabase_flutter: ^2.12.4
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
